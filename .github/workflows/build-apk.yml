name: Build Android APK

# Bundles the entire FORGE web app inside an Android APK via Capacitor.
# No hosting needed — the app runs fully offline once installed.
#
# To build: Actions tab -> "Build Android APK" -> Run workflow.
# Download the APK from the workflow's Artifacts when it completes.

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name shown on the phone'
        required: false
        default: 'FORGE'
        type: string
      package_id:
        description: 'Android package id (reverse-DNS, must be unique to your app)'
        required: false
        default: 'com.malmansoori.forge'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Install Capacitor
        run: npm install --save @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Build Next.js (static export to ./out)
        run: npm run build

      - name: Write capacitor.config.ts
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: '${{ inputs.package_id }}',
            appName: '${{ inputs.app_name }}',
            webDir: 'out',
            android: {
              allowMixedContent: true,
              webContentsDebuggingEnabled: false
            }
          };

          export default config;
          EOF
          cat capacitor.config.ts

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Copy launcher icons from public/icons
        run: |
          ANDROID_RES=android/app/src/main/res
          # Copy 512 to all mipmap densities as a baseline (Capacitor will scale)
          for d in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$ANDROID_RES/$d"
            cp public/icons/icon-192.png "$ANDROID_RES/$d/ic_launcher.png" 2>/dev/null || true
            cp public/icons/icon-192.png "$ANDROID_RES/$d/ic_launcher_round.png" 2>/dev/null || true
            cp public/icons/icon-512.png "$ANDROID_RES/$d/ic_launcher_foreground.png" 2>/dev/null || true
          done

      - name: Build debug APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
          ls -la app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forge-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Print install instructions
        run: |
          echo "================================================================"
          echo "APK built successfully — no hosting required."
          echo ""
          echo "Download forge-android-apk from this workflow's Artifacts."
          echo ""
          echo "To install on your phone:"
          echo "  1. Transfer the APK to your phone (USB, Drive, email)"
          echo "  2. Tap the APK file"
          echo "  3. Allow 'Install unknown apps' if prompted"
          echo "  4. Open the FORGE icon from your launcher"
          echo ""
          echo "The entire app and all its plans/exercises run inside the APK."
          echo "No internet needed after install."
          echo "================================================================"
