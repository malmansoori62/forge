name: Build Android APK

# Manually trigger this workflow from the Actions tab to build a TWA-wrapped
# APK pointing at your deployed PWA. The APK is uploaded as an artifact you
# can download. To install: enable "Install unknown apps" on your phone,
# transfer the APK, and install it.
#
# REQUIRED: deploy the PWA somewhere public first (Vercel is free and fast):
#   1. Sign in at vercel.com with GitHub
#   2. Import this repo, accept the Next.js defaults, deploy
#   3. Copy the resulting URL (e.g. https://forge-xyz.vercel.app)
#   4. Run this workflow with that URL as input

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: 'Deployed PWA URL (e.g. https://forge-xyz.vercel.app)'
        required: true
        type: string
      package_id:
        description: 'Android package id (reverse-DNS, must be unique)'
        required: false
        default: 'com.malmansoori.forge'
        type: string
      app_name:
        description: 'App name shown on phone'
        required: false
        default: 'FORGE'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias forge \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass forgeapp -keypass forgeapp \
            -dname "CN=FORGE, OU=Personal, O=FORGE, L=Unknown, ST=Unknown, C=US"
          echo "--- Keystore SHA-256 fingerprint ---"
          keytool -list -v -keystore android.keystore -storepass forgeapp -alias forge \
            | grep "SHA256:" | head -1

      - name: Write twa-manifest.json
        run: |
          cat > twa-manifest.json <<EOF
          {
            "packageId": "${{ inputs.package_id }}",
            "host": "$(echo '${{ inputs.pwa_url }}' | sed -E 's|^https?://||' | sed 's|/.*||')",
            "name": "${{ inputs.app_name }}",
            "launcherName": "${{ inputs.app_name }}",
            "display": "standalone",
            "themeColor": "#0d0f0c",
            "navigationColor": "#0d0f0c",
            "navigationColorDark": "#0d0f0c",
            "navigationDividerColor": "#0d0f0c",
            "navigationDividerColorDark": "#0d0f0c",
            "backgroundColor": "#0d0f0c",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "${{ inputs.pwa_url }}/icons/icon-512.png",
            "maskableIconUrl": "${{ inputs.pwa_url }}/icons/icon-512.png",
            "appVersionName": "1.0.0",
            "appVersion": 1,
            "shortcuts": [],
            "signingKey": {
              "path": "./android.keystore",
              "alias": "forge"
            },
            "splashScreenFadeOutDuration": 300,
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${{ inputs.pwa_url }}/manifest.webmanifest",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${{ inputs.pwa_url }}/",
            "minSdkVersion": 21,
            "orientation": "portrait"
          }
          EOF
          cat twa-manifest.json

      - name: Initialize Bubblewrap project from manifest file
        run: |
          mkdir -p ./android-build
          cp twa-manifest.json ./android-build/twa-manifest.json
          cp android.keystore ./android-build/android.keystore
          cd ./android-build
          # Generate Android project files from the manifest
          bubblewrap update --skipVersionUpgrade || true
          # If update fails (no prior project), do init with --skipPwaValidation
          if [ ! -f "build.gradle" ]; then
            bubblewrap init \
              --manifest="${{ inputs.pwa_url }}/manifest.webmanifest" \
              --directory=. \
              --skipPwaValidation || true
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build APK
        working-directory: ./android-build
        run: |
          bubblewrap build --skipPwaValidation
          ls -la *.apk *.aab 2>/dev/null || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find ./android-build -name "*.apk" | head -1)
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-android-apk
          path: |
            ./android-build/*.apk
            ./android-build/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Print install instructions
        run: |
          echo "================================================================"
          echo "APK build complete."
          echo ""
          echo "Download it from the workflow's Artifacts (top of this page)."
          echo ""
          echo "To install on your phone:"
          echo "  1. Settings -> Apps -> Special access -> Install unknown apps"
          echo "     Enable it for your file manager / Chrome / wherever you'll open the APK"
          echo "  2. Transfer the APK to your phone (USB, Drive, email)"
          echo "  3. Tap the APK file -> Install"
          echo ""
          echo "Note: Without Digital Asset Links between your hosted PWA and the"
          echo "APK signing key, the TWA may show a URL bar at the top. For a"
          echo "fully chromeless experience, see BUILD_APK.md for asset-links setup."
          echo "================================================================"
